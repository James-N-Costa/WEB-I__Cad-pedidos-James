<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Listagem de Pedidos - Loja de Limpeza</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f6f8;
      padding:30px;
    }

    .container{
      max-width:1100px;
      margin:auto;
      background:#fff;
      padding:25px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    h1{
      margin-bottom:20px;
      color:#1f2937;
    }

    .topo{
      display:flex;
      gap:10px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    input, select{
      padding:10px;
      border:1px solid #ccc;
      border-radius:8px;
      flex:1;
      min-width:180px;
    }

    button{
      background:#0ea5e9;
      color:white;
      border:none;
      padding:10px 18px;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#0284c7;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
    }

    th, td{
      padding:12px;
      text-align:left;
      border-bottom:1px solid #ddd;
    }

    th{
      background:#0ea5e9;
      color:white;
    }

    tr:hover{
      background:#f1f5f9;
    }

    .status{
      padding:6px 10px;
      border-radius:20px;
      font-size:13px;
      font-weight:bold;
    }

    .pendente{
      background:#fef3c7;
      color:#92400e;
    }

    .entregue{
      background:#dcfce7;
      color:#166534;
    }

    .cancelado{
      background:#fee2e2;
      color:#991b1b;
    }

    @media(max-width:768px){
      table{
        font-size:14px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>📦 Listagem de Pedidos</h1>

    <div class="topo">
      <input type="text" id="cliente" placeholder="Nome do cliente">

      <select id="produto">
        <option>Detergente</option>
        <option>Água Sanitária</option>
        <option>Sabão Líquido</option>
        <option>Desinfetante</option>
        <option>Limpa Vidros</option>
      </select>

      <input type="number" id="quantidade" placeholder="Quantidade">

      <select id="status">
        <option value="pendente">Pendente</option>
        <option value="entregue">Entregue</option>
        <option value="cancelado">Cancelado</option>
      </select>

      <button onclick="adicionarPedido()">Adicionar</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Pedido</th>
          <th>Cliente</th>
          <th>Produto</th>
          <th>Quantidade</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody id="tabelaPedidos">
        <tr>
          <td>#001</td>
          <td>Maria Silva</td>
          <td>Detergente</td>
          <td>10</td>
          <td>
            <span class="status entregue">Entregue</span>
          </td>
        </tr>

        <tr>
          <td>#002</td>
          <td>João Lima</td>
          <td>Água Sanitária</td>
          <td>5</td>
          <td>
            <span class="status pendente">Pendente</span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    let contador = 3;

    function adicionarPedido() {
      const cliente = document.getElementById("cliente").value;
      const produto = document.getElementById("produto").value;
      const quantidade = document.getElementById("quantidade").value;
      const status = document.getElementById("status").value;

      if(cliente === "" || quantidade === "") {
        alert("Preencha todos os campos!");
        return;
      }

      const tabela = document.getElementById("tabelaPedidos");

      const linha = document.createElement("tr");

      linha.innerHTML = `
        <td>#00${contador}</td>
        <td>${cliente}</td>
        <td>${produto}</td>
        <td>${quantidade}</td>
        <td>
          <span class="status ${status}">
            ${status.charAt(0).toUpperCase() + status.slice(1)}
          </span>
        </td>
      `;

      tabela.appendChild(linha);

      contador++;

      // Limpar campos
      document.getElementById("cliente").value = "";
      document.getElementById("quantidade").value = "";
    }
  </script>

</body>
</html>
